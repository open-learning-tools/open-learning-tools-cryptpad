# Optional parent Nginx replacement for the cryptpad.localhost server block.
# This expects the parent nginx.conf to define:
#
#   upstream cryptpad_backend {
#     server cryptpad:3000;
#   }
#
#   upstream cryptpad_websocket_backend {
#     server cryptpad:3003;
#   }

server {
  listen 80;
  server_name cryptpad.localhost cryptpad-sandbox.localhost;
  client_max_body_size 256m;

  location / {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location ^~ /cryptpad_websocket {
    proxy_pass http://cryptpad_websocket_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
